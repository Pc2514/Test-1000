<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深層心理診断</title>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100vh;
}

/* テキスト */
h1 { font-size: 5vw; }

/* 時間表示 */
#clock {
    position: fixed;
    top: 10px;
    right: 15px;
    font-size: 14px;
    color: #0f0;
}

/* HP */
#hpContainer {
    width: 80%;
    height: 20px;
    border: 2px solid #0f0;
    margin: 20px auto;
}
#hpBar {
    height: 100%;
    width: 100%;
    background: #0f0;
}

/* ボタン */
button {
    width: 80%;
    max-width: 300px;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    background: black;
    color: #0f0;
    border: 2px solid #0f0;
    border-radius: 10px;
}

/* glitch */
.glitch {
    color: red;
    text-shadow: 0 0 10px red;
}
</style>
</head>

<body>

<div id="clock"></div>
<h1 id="text"></h1>

<div id="hpContainer">
<div id="hpBar"></div>
</div>

<div id="choices"></div>

<script>
let stage = 0;
let hp = 100;
let name = "あなた";
let choicesLog = [];

/* 時間表示 */
function updateClock(){
    const now = new Date();
    const time = now.getHours()+"時"+now.getMinutes()+"分"+now.getSeconds()+"秒";
    document.getElementById("clock").innerText = time;
}
setInterval(updateClock,1000);

/* 戻るボタン無効 */
history.pushState(null, null, location.href);
window.onpopstate = function(){
    history.go(1);
};

/* 離脱警告 */
window.onbeforeunload = function(){
    return "本当に離れますか？";
};

/* フルスクリーン */
document.body.onclick = () => {
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
};

const questions = [
"開始しますか？",
"人を信じますか？",
"後ろに気配を感じたら？",
"夜中に音がしたら？",
"知らない番号から電話が来たら？",
"誰かに見られている気がする？",
"助けを求める声が聞こえたら？",
"ここまで来た理由は？",
"このまま続けますか？",
"最後です。本当にいい？"
];

/* タイピング */
function typeText(text, callback){
    const el = document.getElementById("text");
    el.innerHTML = "";
    let i = 0;
    function typing(){
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 25);
        } else {
            if(callback) callback();
        }
    }
    typing();
}

function updateHP(){
    document.getElementById("hpBar").style.width = hp + "%";
}

/* 選択肢 */
function showChoices(){
    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    ["はい","いいえ"].forEach(text => {
        const btn = document.createElement("button");
        btn.innerText = text;

        btn.onclick = () => {
            choicesLog.push(text);

            hp -= (text === "はい") ? 12 : 6;
            if(hp < 0) hp = 0;

            updateHP();

            // 一瞬消す（不安演出）
            choices.innerHTML = "";
            setTimeout(next, 300);
        };

        choices.appendChild(btn);
    });
}

function next(){
    if(stage < questions.length){

        let q = questions[stage];

        if(stage === 1){
            name = prompt("名前を入力してください") || "あなた";
        }

        if(stage === 3){
            const now = new Date();
            q = name + "さん、今" + now.getHours()+"時"+now.getMinutes()+"分ですよね？";
        }

        if(stage === 6){
            q = "あなたの選択はすべて記録されています";
        }

        if(stage === 8){
            q = "もう戻れません";
        }

        typeText(q, showChoices);
        stage++;

    } else {
        end();
    }
}

function end(){
    typeText("最終解析中...", () => {

        setTimeout(() => {

            const yesCount = choicesLog.filter(c => c === "はい").length;

            let result = (yesCount > 5)
                ? "最後まで抜け出せないタイプ"
                : "疑いながらも従ってしまうタイプ";

            document.getElementById("text").innerHTML =
            "<span class='glitch'>" + name + "さんは「" + result + "」です</span>";

            setTimeout(() => {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }, 2500);

        }, 1500);
    });
}

next();
updateHP();
</script>

</body>
</html>
