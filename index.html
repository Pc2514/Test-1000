<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深層心理診断</title>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

/* テキスト */
h1 { font-size: 5vw; }

/* 時間表示 */
#clock {
    position: fixed;
    top: 10px;
    right: 15px;
    font-size: 14px;
    color: #0f0;
}

/* HPバー */
#hpContainer {
    width: 80%;
    height: 20px;
    border: 2px solid #0f0;
    margin: 20px auto;
}
#hpBar {
    height: 100%;
    width: 100%;
    background: #0f0;
    transition: 0.3s;
}

/* ボタン */
button {
    width: 80%;
    max-width: 300px;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    background: black;
    color: #0f0;
    border: 2px solid #0f0;
    border-radius: 10px;
    transition: 0.2s;
}

/* glitch */
.glitch {
    color: red;
    text-shadow: 0 0 10px red;
}

/* HPバー危険色 */
.lowHP {
    background: red !important;
}
</style>
</head>

<body>

<div id="clock"></div>
<h1 id="text"></h1>

<div id="hpContainer">
    <div id="hpBar"></div>
</div>

<div id="choices"></div>

<script>
let stage = 0;
let hp = 100;
let name = "あなた";
let choicesLog = [];

/* 時間表示 */
function updateClock(){
    const now = new Date();
    const time = now.getHours() + "時" + now.getMinutes() + "分" + now.getSeconds() + "秒";
    document.getElementById("clock").innerText = time;
}
setInterval(updateClock, 1000);

/* 戻る無効 */
history.pushState(null, null, location.href);
window.onpopstate = function(){ history.go(1); };

/* 離脱警告 */
window.onbeforeunload = function(){ return "本当に離れますか？"; };

/* フルスクリーン */
document.body.onclick = () => {
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
};

const questions = [
"開始しますか？",
"人を信じますか？",
"後ろに気配を感じたら？",
"夜中に音がしたら？",
"知らない番号から電話が来たら？",
"誰かに見られている気がする？",
"助けを求める声が聞こえたら？",
"ここまで来た理由は？",
"このまま続けますか？",
"最後です。本当にいい？"
];

/* タイピング */
function typeText(text, callback){
    const el = document.getElementById("text");
    el.innerHTML = "";
    let i = 0;
    function typing(){
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 25);
        } else {
            if(callback) callback();
        }
    }
    typing();
}

/* HP更新 */
function updateHP(){
    const bar = document.getElementById("hpBar");
    bar.style.width = hp + "%";
    if(hp < 40){
        bar.classList.add("lowHP");
    }
}

/* 選択肢表示 */
function showChoices(){
    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    ["はい","いいえ"].forEach(text => {
        const btn = document.createElement("button");
        btn.innerText = text;

        // 選択によってHP変化
        btn.onclick = () => {
            choicesLog.push(text);
            hp -= (text === "はい") ? 12 : 6;
            if(hp < 0) hp = 0;
            updateHP();

            // 一瞬選択肢消して不安演出
            choices.innerHTML = "";
            setTimeout(next, 300);
        };

        choices.appendChild(btn);
    });
}

function next(){
    if(stage < questions.length){

        let q = questions[stage];

        // 名前入力
        if(stage === 1){
            name = prompt("名前を入力してください") || "あなた";
        }

        // 時間表示演出
        if(stage === 3){
            const now = new Date();
            q = name + "さん、今" + now.getHours()+"時"+now.getMinutes()+"分ですよね？";
        }

        // 選択記録演出
        if(stage === 6){
            q = "あなたの選択はすべて記録されています";
        }

        if(stage === 8){
            q = "もう戻れません…";
        }

        // 選択履歴に応じて心理的に変化
        if(stage === 5 && choicesLog[2] === "いいえ"){
            q = "警戒心が強いですね…でも油断は禁物";
        }

        typeText(q, showChoices);
        stage++;

    } else {
        end();
    }
}

/* 最終解析 → YouTube遷移 */
function end(){
    typeText("最終解析中...", () => {
        setTimeout(() => {
            const yesCount = choicesLog.filter(c => c === "はい").length;
            let result = (yesCount > 5)
                ? "最後まで抜け出せないタイプ"
                : "疑いながらも従ってしまうタイプ";

            document.getElementById("text").innerHTML =
                "<span class='glitch'>" + name + "さんは「" + result + "」です</span>";

            // YouTubeに飛ぶボタン表示
            const choicesDiv = document.getElementById("choices");
            choicesDiv.innerHTML = "";
            const btn = document.createElement("button");
            btn.innerText = "結果を見る";
            btn.onclick = () => {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            };
            choicesDiv.appendChild(btn);

        }, 1500);
    });
}

/* 初期開始 */
next();
updateHP();
</script>

</body>
</html>
