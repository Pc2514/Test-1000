<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深層心理診断</title>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}
h1 { font-size: 5vw; }
#clock { position: fixed; top: 10px; right: 15px; font-size: 14px; color: #0f0; }
#hpContainer { width: 80%; height: 20px; border: 2px solid #0f0; margin: 20px auto; }
#hpBar { height: 100%; width: 100%; background: #0f0; transition: 0.3s; }
button { width: 80%; max-width: 300px; margin: 10px auto; padding: 15px; font-size: 18px; background: black; color: #0f0; border: 2px solid #0f0; border-radius: 10px; transition: 0.2s; }
.glitch { color: red; text-shadow: 0 0 10px red; }
.lowHP { background: red !important; }
</style>
</head>

<body>

<div id="clock"></div>
<h1 id="text"></h1>
<div id="hpContainer"><div id="hpBar"></div></div>
<div id="choices"></div>

<!-- 効果音 -->
<audio id="clickSound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="dangerSound" src="https://freesound.org/data/previews/398/398438_5121236-lq.mp3"></audio>
<audio id="glitchSound" src="https://freesound.org/data/previews/341/341695_6242712-lq.mp3"></audio>
<audio id="alarmSound" src="https://freesound.org/data/previews/341/341695_6242712-lq.mp3"></audio>

<script>
let stage = 0;
let hp = 100;
let name = "あなた";
let choicesLog = [];

/* 時計 */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText = now.getHours()+"時"+now.getMinutes()+"分"+now.getSeconds()+"秒";
}
setInterval(updateClock, 1000);

/* 戻る無効・離脱警告・フルスクリーン */
history.pushState(null,null,location.href);
window.onpopstate=function(){history.go(1);};
window.onbeforeunload=function(){return "本当に離れますか？";};
document.body.onclick=()=>{if(document.documentElement.requestFullscreen){document.documentElement.requestFullscreen();}};

/* 質問 */
const questions=[
"開始しますか？",
"人を信じますか？",
"後ろに気配を感じたら？",
"夜中に音がしたら？",
"知らない番号から電話が来たら？",
"誰かに見られている気がする？",
"助けを求める声が聞こえたら？",
"ここまで来た理由は？",
"このまま続けますか？",
"最後です。本当にいい？"
];

/* タイピング */
function typeText(text, callback){
    const el=document.getElementById("text");
    el.innerHTML="";
    let i=0;
    function typing(){
        if(i<text.length){el.innerHTML+=text.charAt(i);i++;setTimeout(typing,25);}
        else{if(callback)callback();}
    }
    typing();
}

/* HP更新＋効果音 */
function updateHP(){
    const bar=document.getElementById("hpBar");
    bar.style.width=hp+"%";
    if(hp<40){bar.classList.add("lowHP"); document.getElementById("dangerSound").play();}
}

/* 選択肢表示 */
function showChoices(){
    const choicesDiv=document.getElementById("choices");
    choicesDiv.innerHTML="";
    ["はい","いいえ"].forEach(text=>{
        const btn=document.createElement("button");
        btn.innerText=text;
        btn.onclick=()=>{
            // 効果音
            document.getElementById("clickSound").currentTime=0;
            document.getElementById("clickSound").play();
            document.getElementById("glitchSound").currentTime=0;
            document.getElementById("glitchSound").play();

            choicesLog.push(text);
            hp-=(text==="はい")?12:6;
            if(hp<0)hp=0;
            updateHP();

            // 選択肢を一瞬消す
            choicesDiv.innerHTML="";
            setTimeout(next,300);
        };
        choicesDiv.appendChild(btn);
    });
}

/* 次の質問 */
function next(){
    if(stage<questions.length){
        let q=questions[stage];
        if(stage===1){name=prompt("名前を入力してください")||"あなた";}
        if(stage===3){
            const now=new Date();
            q=name+"さん、今"+now.getHours()+"時"+now.getMinutes()+"分ですよね？";
        }
        if(stage===5&&choicesLog[2]==="いいえ"){q="警戒心が強いですね…でも油断は禁物";}
        if(stage===6){q="あなたの選択はすべて記録されています";}
        if(stage===8){q="もう戻れません…";}
        typeText(q, showChoices);
        stage++;
    } else {end();}
}

/* 最終解析＋YouTubeボタン＋効果音 */
function end(){
    typeText("最終解析中...", ()=>{
        setTimeout(()=>{
            const yesCount=choicesLog.filter(c=>c==="はい").length;
            let result=(yesCount>5)
                ?"最後まで抜け出せないタイプ"
                :"疑いながらも従ってしまうタイプ";

            // 効果音
            const alarm=document.getElementById("alarmSound");
            alarm.currentTime=0;
            alarm.play();

            document.getElementById("text").innerHTML="<span class='glitch'>"+name+"さんは「"+result+"」です</span>";

            const choicesDiv=document.getElementById("choices");
            choicesDiv.innerHTML="";
            const btn=document.createElement("button");
            btn.innerText="結果を見る";
            btn.onclick=()=>{window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ";};
            choicesDiv.appendChild(btn);

        },1500);
    });
}

/* 開始 */
next();
updateHP();
</script>
</body>
</html>
